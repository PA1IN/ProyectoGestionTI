services:
  db:
    image: postgres:15-alpine
    env_file:
      - ./Backend/.env
    ports:
      - "5433:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/postgresql/data
  pagos:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        APP_NAME: pagos
    env_file:
      - ./Backend/.env
    ports:
      - "3001:3001"
    depends_on:
      - db

  conciliacion:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        APP_NAME: conciliacion
    env_file:
      - ./Backend/.env
    ports:
      - "3002:3002"
    depends_on:
      - db

  analitica:
    build:
      context: ./Backend
      dockerfile: Dockerfile
      args:
        APP_NAME: analitica
    env_file:
      - ./Backend/.env
    ports:
      - "3003:3003"
    depends_on:
      - db

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # UI web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10


volumes:
  db_data:
